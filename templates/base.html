<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}APM Feedback{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:       #0f1117;
      --ink-soft:  #3d4151;
      --ink-faint: #7b8098;
      --paper:     #faf9f6;
      --paper-2:   #f2f1ed;
      --paper-3:   #e8e6e0;
      --accent:    #2e5cff;
      --accent-2:  #1a3dc9;
      --pos:       #0d9f6e;
      --neu:       #7b8098;
      --neg:       #d94f4f;
      --warn:      #e07c00;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans:  'DM Sans', system-ui, sans-serif;
      --font-mono:  'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--paper);
      color: var(--ink);
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .site-header {
      background: var(--ink);
      color: #fff;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header .brand {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .site-header .brand span {
      font-family: var(--font-sans);
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
    }
    .site-header nav a {
      color: rgba(255,255,255,.7);
      font-size: .875rem;
      font-weight: 500;
      margin-left: 24px;
      transition: color .15s;
    }
    .site-header nav a:hover { color: #fff; text-decoration: none; }
    .site-header nav a.active { color: #fff; }

    .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }
    .container-wide { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      border-radius: var(--radius);
      font-family: var(--font-sans);
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      text-decoration: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-2); text-decoration: none; color: #fff; }
    .btn-outline { background: transparent; color: var(--ink); border: 1.5px solid var(--paper-3); }
    .btn-outline:hover { background: var(--paper-2); text-decoration: none; }
    .btn-ghost { background: transparent; color: var(--ink-soft); border: none; }
    .btn-ghost:hover { background: var(--paper-2); text-decoration: none; }
    .btn-sm { padding: 6px 14px; font-size: .8rem; }
    .btn-lg { padding: 13px 28px; font-size: 1rem; }

    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .badge-pos { background: #e6f7f2; color: var(--pos); }
    .badge-neg { background: #fdeaea; color: var(--neg); }
    .badge-neu { background: var(--paper-2); color: var(--neu); }
    .badge-accent { background: #edf1ff; color: var(--accent); }

    .card {
      background: #fff;
      border: 1px solid var(--paper-3);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: .75rem;
      font-weight: 500;
      background: var(--paper-2);
      color: var(--ink-soft);
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<header class="site-header">
  <div class="brand">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect width="22" height="22" rx="6" fill="#2e5cff"/>
      <rect x="5" y="5" width="5" height="5" rx="1.5" fill="white"/>
      <rect x="12" y="5" width="5" height="5" rx="1.5" fill="white" opacity=".6"/>
      <rect x="5" y="12" width="5" height="5" rx="1.5" fill="white" opacity=".6"/>
      <rect x="12" y="12" width="5" height="5" rx="1.5" fill="white" opacity=".35"/>
    </svg>
    APM Feedback System
    <span>Assessment Tool</span>
  </div>
  <nav>
    <a href="/form" {% if request.path == '/form' %}class="active"{% endif %}>Submit Feedback</a>
    <a href="/dashboard" {% if '/dashboard' in request.path %}class="active"{% endif %}>Dashboard</a>
  </nav>
</header>
{% block content %}{% endblock %}
</body>
</html>
